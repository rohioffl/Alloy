# Prometheus Alert Rules for Node Monitoring
# These are backup/reference rules - Grafana has its own alerting configured

groups:
  - name: node_availability
    interval: 30s
    rules:
      - alert: NodeDown
        expr: up{job="integrations/unix"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.host }} is down"
          description: "Node {{ $labels.host }} has been down for more than 2 minutes."

      - alert: PortDown
        expr: probe_success{job="blackbox"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Port {{ $labels.port }} down on {{ $labels.host }}"
          description: "Port {{ $labels.port }} on {{ $labels.host }} is not responding."

  - name: node_resources
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: |
          (1 - avg by(host) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.host }}"
          description: "CPU usage is {{ $value | humanize }}% on {{ $labels.host }}."

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.host }}"
          description: "Memory usage is {{ $value | humanize }}% on {{ $labels.host }}."

      - alert: LowDiskSpace
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.host }}"
          description: "Disk usage is {{ $value | humanize }}% on {{ $labels.host }} ({{ $labels.mountpoint }})."

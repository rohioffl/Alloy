# Prometheus Configuration for Alloy Monitoring Platform

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    cluster: 'alloy-monitoring'
    environment: 'production'

# Alerting configuration (uses Grafana's built-in alerting)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # Uncomment if using external Alertmanager
      # - targets:
      #   - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # ============================================================================
  # Prometheus Self-Monitoring
  # ============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
          job_type: 'monitoring'

  # ============================================================================
  # Central Monitoring API - Node Metadata & Port Info
  # ============================================================================
  - job_name: 'monitor-api'
    scrape_interval: 30s
    static_configs:
      - targets: ['monitor-api:9099']
        labels:
          instance: 'monitor-api'
          job_type: 'metadata'

  # ============================================================================
  # Alloy Agents - Unix Metrics (Node Exporters)
  # Remote write from nodes to Prometheus :9090/api/v1/write
  # ============================================================================
  # Note: Nodes remote_write directly to Prometheus
  # No scrape config needed - metrics arrive via remote_write

  # For reference, if you were scraping instead of remote_write:
  # - job_name: 'integrations/unix'
  #   static_configs:
  #     - targets: ['node1:9100', 'node2:9100']

  # ============================================================================
  # Uptime Kuma - External Site Monitoring
  # ============================================================================
  - job_name: 'uptime-kuma'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['uptime-kuma:3001']
        labels:
          instance: 'uptime-kuma'
          job_type: 'external_monitoring'

  # ============================================================================
  # Grafana Self-Monitoring (Optional)
  # ============================================================================
  - job_name: 'grafana'
    scrape_interval: 30s
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: 'grafana'
          job_type: 'monitoring'

# Remote write configuration for external Prometheus/Cortex/Mimir (optional)
# remote_write:
#   - url: 'https://prometheus-remote-write-endpoint/api/v1/write'
#     basic_auth:
#       username: 'user'
#       password: 'pass'

# Remote read configuration (optional)
# remote_read:
#   - url: 'https://prometheus-remote-read-endpoint/api/v1/read'
#     read_recent: true

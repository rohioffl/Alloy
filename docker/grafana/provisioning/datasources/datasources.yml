# Grafana Datasource Provisioning Configuration

apiVersion: 1

# List of datasources to insert/update
datasources:
  # Prometheus datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 30s
      queryTimeout: 60s
      # Enable Exemplars (for tracing integration)
      exemplarTraceIdDestinations: []
    version: 1

  # Port Monitor API (Infinity datasource)
  - name: Port Monitor API
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://monitor-api:9099
    isDefault: false
    editable: true
    jsonData:
      auth_method: 'none'
      allowedHosts: ['monitor-api:9099', 'http://monitor-api:9099', 'port-monitor-api:9099']
    version: 1


# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  # Main monitoring dashboards
  - name: 'Alloy Monitoring'
    orgId: 1
    folder: 'Monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false

# Note: Dashboard JSON files should be placed in:
# /home/ubuntu/monitoring/dashboards/
# which is mounted to /etc/grafana/dashboards in the container

##################### Zentra Monitoring Configuration #####################
#
# Custom Grafana configuration for Zentra branding
#

[default]
# Application title
app_name = Zentra

[server]
# Public URL (HTTPS via nginx reverse proxy)
root_url = https://zentra.ankercloud.com/
domain = zentra.ankercloud.com
serve_from_sub_path = false

[security]
# disable gravatar profile images
disable_gravatar = true

# Allow <iframe> in text panels (Port Monitor API inventory UI)
[panels]
disable_sanitize_html = true

# Set to true when served over HTTPS (nginx + Let's Encrypt)
cookie_secure = true

# Set cookie SameSite attribute. defaults to `lax`. can be set to "lax", "strict", "none" and "disabled"
;cookie_samesite = lax

[users]
# disable user signup / registration
allow_sign_up = false

# Set to true to automatically assign new users to the default organization (id 1)
auto_assign_org = true

# Default role new users will be automatically assigned (if disabled above is set to true)
auto_assign_org_role = Viewer

# Default UI theme ("dark" or "light")
default_theme = dark

[auth]
# Login cookie name
login_cookie_name = zentra_session

# The lifetime (days) an authenticated user can be inactive before being required to login at next visit. Default is 7 days.
login_maximum_inactive_lifetime_days = 7

# The maximum lifetime (days) an authenticated user can be logged in since login time before being required to login. Default is 30 days.
login_maximum_lifetime_days = 30

[auth.anonymous]
# enable anonymous access
enabled = false

[analytics]
# disable reporting to grafana.com
reporting_enabled = false
check_for_updates = false

# Google Analytics universal tracking code, only enabled if you specify an id here
;google_analytics_ua_id =

[snapshots]
# snapshot sharing options
external_enabled = false

[dashboards]
# Number of versions to keep (per dashboard). Default: 20, Minimum: 1
versions_to_keep = 20

# Minimum refresh interval
;min_refresh_interval = 5s

# Default home dashboard path
;default_home_dashboard_path =

[dataproxy]
# This enables data proxy logging, default is false
logging = false

# How long the data proxy waits to read the headers of the response before timing out, default is 30 seconds.
# This setting also applies to core backend HTTP data sources where query requests use an HTTP client with timeout set.
timeout = 30

# How long the data proxy waits to establish a TCP connection before timing out, default is 10 seconds.
dialTimeout = 10

# How many seconds the data proxy waits before sending a keepalive probe request.
keep_alive_seconds = 30

[log]
# Either "console", "file", "syslog". Default is console and file
# Use space to separate multiple modes, e.g. "console file"
mode = console

# Either "debug", "info", "warn", "error", "critical", default is "info"
level = info

[log.console]
# log line format, valid options are text, console and json
format = console

# log level
level = info

[log.file]
# log line format, valid options are text, console and json
format = text

# This enables automated log rotate(switch of following options), default is true
log_rotate = true

# Max line number of single file, default is 1000000
max_lines = 1000000

# Max size shift of single file, default is 28 means 1 << 28, 256MB
max_size_shift = 28

# Segment log daily, default is true
daily_rotate = true

# Expired days of log file(delete after max days), default is 7
max_days = 7

[quota]
enabled = false

[alerting]
# Disable alerting engine & UI features
;enabled = true

# Makes it possible to turn off alert rule execution but alerting UI is visible
;execute_alerts = true

# Default setting for new alert rules. Defaults to categorize error and timeouts as alerting. (alerting, keep_state)
;error_or_timeout = alerting

# Default setting for how Grafana handles nodata or null values in alerting. (alerting, no_data, keep_state, ok)
;nodata_or_nullvalues = no_data

# Alert notifications can include images, but rendering many images at the same time can overload the server
# This limit will protect the server from render overloading and make sure notifications are sent out quickly
;concurrent_render_limit = 5

[unified_alerting]
# Enable the Unified Alerting sub-system and interface
;enabled = true

# Comma-separated list of organization IDs for which to disable unified alerting
;disabled_orgs =

[feature_toggles]
# Enable features, separated by spaces
# Example: enable = feature1 feature2
;enable =

[date_formats]
# For information on what formatting patterns that are supported https://momentjs.com/docs/#/displaying/

# Default system date format used in time range picker and other places where full time is displayed
;full_date = YYYY-MM-DD HH:mm:ss

# Used by graph and other places where we only show small intervals
;interval_second = HH:mm:ss
;interval_minute = HH:mm
;interval_hour = MM/DD HH:mm
;interval_day = MM/DD
;interval_month = YYYY-MM
;interval_year = YYYY

# Experimental feature
;use_browser_locale = false

# Default timezone for user preferences. Options are 'browser' for the browser local timezone or a timezone name from IANA Time Zone database, e.g. 'UTC' or 'Europe/Amsterdam' etc.
;default_timezone = browser

[explore]
# Hide Explore from the sidebar (set to true to re-enable)
enabled = false

[help]
enabled = false

[news]
news_feed_enabled = false

[smtp]
# Overridden by GF_SMTP_* env vars in docker-compose.full.yml when using Docker.
# AWS SES: create SMTP credentials in SES console, verify the FROM domain/email.
enabled = false
host = email-smtp.ap-south-1.amazonaws.com:587
user =
password =
from_address = zentra@ankercloud.com
from_name = Zentra Monitoring
startTLS_policy = MandatoryStartTLS

[profile]
# Enable the Profile section
;enabled = true

[news]
# Grafana news feed
;news_feed_enabled = true

#################################### Custom Branding ####################################
# Note: Full white labeling requires Grafana Enterprise
# This is OSS version - branding is done via Docker image modification
# See Dockerfile.grafana and docs/GRAFANA_BRANDING_GUIDE.md for details
